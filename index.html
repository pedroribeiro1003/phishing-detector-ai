<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Detector de Phishing 🔐</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      margin-top: 120px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 30px;
    }

    input {
      padding: 14px;
      width: 320px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-left: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    #resultado {
      margin-top: 30px;
      font-size: 26px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>🔐 Detector de Phishing</h1>

  <input type="text" id="url" placeholder="Cole a URL aqui">
  <button onclick="verificar()">Verificar</button>

  <div id="resultado"></div>

  <script>
    async function verificar() {
      const url = document.getElementById("url").value;
      const resultado = document.getElementById("resultado");

      if (!url) {
        resultado.innerHTML = "⚠️ Digite uma URL";
        resultado.style.color = "orange";
        return;
      }

      resultado.innerHTML = "🔍 Analisando...";

      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url: url })
        });

        const data = await response.json();

        console.log("Resposta:", data);

        if (data.resultado === "Phishing") {
          resultado.innerHTML = "⚠️ Phishing detectado";
          resultado.style.color = "red";
        } else {
          resultado.innerHTML = "✅ Site seguro";
          resultado.style.color = "lightgreen";
        }

      } catch (error) {
        console.error("Erro fetch:", error);
        resultado.innerHTML = "❌ Erro ao conectar com a API";
        resultado.style.color = "orange";
      }
    }
  </script>

</body>
</html>
